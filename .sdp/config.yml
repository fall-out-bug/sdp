# SDP project config (dogfooding — AC1)
version: 1

acceptance:
  command: "cd sdp-plugin && go test ./... -run TestSmoke -count=1"
  timeout: 60s
  expected: "ok"

evidence:
  enabled: true
  log_path: ".sdp/log/events.jsonl"
  # Evidence Log Policy (F067-07):
  # - events.jsonl is auto-generated and should NOT be committed
  # - Each session appends hash-chained events for traceability
  # - Use 'sdp log trace' to verify chain integrity
  # - Use 'sdp log export' for archival if needed
  policy:
    retention_days: 90
    max_size_mb: 10
    auto_compact: true

quality:
  # Balancing metrics (all must pass):
  coverage_threshold: 80      # Minimum test coverage %
  test_code_ratio_min: 1.5    # Minimum lines of test code per line of production code
  test_code_ratio_max: 2.0    # Maximum ratio (avoid over-testing)
  max_file_loc: 200
  # Packages excluded from coverage requirements
  # cmd/sdp: CLI commands require integration tests
  # internal/quality: Depends on external tools (gocyclo, radon, mypy, mvn)
  coverage_exclude:
    - "cmd/sdp"
    - "internal/quality"

# Guard policy settings (WS-063-03: AC3)
guard:
  mode: "standard"  # standard | strict | permissive
  rules_file: ".sdp/guard-rules.yml"
  severity_mapping:
    error: "block"   # Block workflow execution
    warning: "warn"   # Display warning, continue
    info: "log"       # Log only, no display

# Risk-based reviewer depth allocation (F098)
review:
  # All 7 reviewers always spawned; LOC tiers control DEPTH not presence
  # Low LOC: only qa + techlead do deep review (others rubber-stamp)
  # Medium LOC: qa + security + techlead do deep review (others rubber-stamp)
  # High LOC: all 7 reviewers do deep review
  loc_tiers:
    - max_loc: 50
      deep_reviewers: [qa, techlead]
    - max_loc: 200
      deep_reviewers: [qa, security, techlead]
    - max_loc: null  # No upper limit (catch-all)
      deep_reviewers: [qa, security, devops, sre, techlead, docs, promptops]

  # Risk patterns override LOC tiers - force specific reviewers to deep review
  # Patterns use glob syntax matching file paths
  # Each pattern can specify multiple reviewers who must do deep review
  risk_patterns:
    # Security-sensitive areas
    - pattern: "**/auth/**"
      roles: [security, qa]
    - pattern: "**/crypto/**"
      roles: [security, qa]
    - pattern: "**/*auth*.go"
      roles: [security, qa]
    - pattern: "**/*crypto*.go"
      roles: [security, qa]
    - pattern: "**/jwt/**"
      roles: [security, qa]

    # DevOps/CI areas
    - pattern: "**/.github/workflows/**"
      roles: [devops, sre]
    - pattern: "**/ci/**"
      roles: [devops, sre]
    - pattern: "**/*deploy*"
      roles: [devops, sre]
    - pattern: "**/*pipeline*"
      roles: [devops, sre]
    - pattern: "**/docker/**"
      roles: [devops, sre]

    # SRE/DB areas
    - pattern: "**/migrations/**"
      roles: [sre, security]
    - pattern: "**/db/**"
      roles: [sre, security]
    - pattern: "**/*schema*.sql"
      roles: [sre, security]
    - pattern: "**/*migration*"
      roles: [sre, security]

    # Documentation areas
    - pattern: "**/docs/**"
      roles: [docs]
    - pattern: "**/*.md"
      roles: [docs]

    # PromptOps areas
    - pattern: "**/prompts/**"
      roles: [promptops]
    - pattern: "**/.claude/skills/**"
      roles: [promptops]

  # Flag overrides for reviewer depth
  # All 7 reviewers always spawned; flags control DEPTH only
  flags:
    full:
      deep_reviewers: [qa, security, devops, sre, techlead, docs, promptops]
    quick:
      deep_reviewers: [qa, techlead]
